services:
  # Node.js Backend Service
  - type: web
    name: lung-cancer-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 5000
      
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: lung-cancer-ml-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: GROQ_API_KEY
        sync: false # User needs to enter this in the dashboard
      - key: MONGO_URI
        sync: false # User needs to enter this if they have MongoDB

  # Python ML Microservice
  - type: web
    name: lung-cancer-ml-service
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
